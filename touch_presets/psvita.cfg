//=======================================================================
//	Touchscreen configuration preset for Half-Life 1 on PS Vita
//			made by SNMetamorph
//=======================================================================

touch_config_file "touch_profiles/psvita.cfg"

// sensitivity settings
touch_pitch "90"
touch_yaw "120"
touch_forwardzone "0.06"
touch_sidezone "0.06"
touch_nonlinear_look "0"
touch_pow_factor "1.3"
touch_pow_mult "400"
touch_exp_mult "0"

// grid settings
touch_grid_count "50"
touch_grid_enable "1"

// global overstroke (width, r, g, b, a)
touch_set_stroke 1 255 255 255 255

// highlight when pressed
touch_highlight_r "1"
touch_highlight_g "1"
touch_highlight_b "1"
touch_highlight_a "1"

// _joy and _dpad options
touch_dpad_radius "1"
touch_joy_radius "1"

// how much slowdown when Precise Look button pressed
touch_precise_amount "0.5"

// enable/disable move indicator
touch_move_indicator "0"

// reset menu state when execing config
touch_setclientonly "0"

// touch buttons
touch_removeall
touch_aspectratio 0.566667
touch_addbutton "look" "" "_look" 0.5 -0 1 0.988237 255 255 255 255 0
touch_addbutton "loadquick" "touch_default/load" "loadquick" 0.76 0 0.84 0.141176 255 255 255 255 16
touch_addbutton "savequick" "touch_default/save" "savequick" 0.84 0 0.92 0.141176 255 255 255 255 16
touch_addbutton "messagemode" "touch_default/keyboard" "messagemode" 0.84 0 0.92 0.141176 255 255 255 255 8
touch_addbutton "flashlight" "touch_default/flash_light_filled" "impulse 100" 0.92 0 1 0.141176 255 255 255 255 1
touch_addbutton "scores" "touch_default/map" "+showscores" 0.76 0 0.84 0.141176 255 255 255 255 8
touch_addbutton "spray" "touch_default/spray" "impulse 201" 0.68 0 0.76 0.141176 255 255 255 255 8
touch_addbutton "show_numbers" "touch_default/show_weapons" "exec touch_default/numbers.cfg" 0.46 0.847061 0.54 0.988237 255 255 255 255 0
touch_addbutton "tduck" "touch_default/tduck" ";+duck" 0.56 0.882355 0.62 0.988237 255 255 255 255 0
touch_addbutton "duck" "touch_default/crouch" "+duck" 0.88 0.705882 1 0.917649 255 255 255 255 0
touch_addbutton "edit" "touch_default/settings" "touch_enableedit" 0.46 0 0.54 0.141176 255 255 255 255 32
touch_addbutton "voicechat" "touch_default/microphone" "+voicerecord" 0.64 0.847059 0.72 0.988235 255 255 255 255 8
